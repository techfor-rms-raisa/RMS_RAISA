name: Atualizar CONTEXT.md

on:
  schedule:
    # Diariamente às 06:00 BRT (09:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Permite rodar manualmente pelo GitHub Actions UI

jobs:
  update-context:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para fazer commit no repositório

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          ref: preview   # atualiza sempre no branch de desenvolvimento

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Executar script de atualização
        run: node scripts/update-context.js

      - name: Verificar se houve mudanças
        id: changes
        run: |
          if git diff --quiet CONTEXT.md; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit e push (se houver mudanças)
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CONTEXT.md
          git commit -m "chore(context): atualização automática diária [skip ci]"
          git push origin preview
